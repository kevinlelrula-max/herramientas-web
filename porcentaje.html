<!DOCTYPE html>
<html>
<head>
<title>Calculadora de Porcentaje</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Calculadora de Porcentaje</h2>

<input type="number" id="numero" placeholder="Número">

<input type="number" id="porcentaje" placeholder="Porcentaje">

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

<script>

function calcular(){

let numero = document.getElementById("numero").value;
let porcentaje = document.getElementById("porcentaje").value;

let resultado = (numero * porcentaje) / 100;

document.getElementById("resultado").innerHTML =
"Resultado: " + resultado;

}

</script>

</body>
</html>
